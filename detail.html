<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>详情 | AI 人才追踪器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #06060c;
  --bg-secondary: #0d0d18;
  --bg-card: #111122;
  --bg-card-hover: #161633;
  --border: #1a1a3e;
  --text-primary: #e8e8f0;
  --text-secondary: #8888aa;
  --text-muted: #555570;
  --blue: #00d4ff;
  --blue-dim: #00d4ff33;
  --amber: #ffaa00;
  --amber-dim: #ffaa0033;
  --green: #00ff88;
  --green-dim: #00ff8822;
  --red: #ff4466;
  --red-dim: #ff446622;
  --purple: #8b5cf6;
  --purple-dim: #8b5cf622;
  --font-display: 'Space Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  line-height: 1.6;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 80px 80px;
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px;
  position: relative;
  z-index: 1;
}

/* ═══ HEADER ═══ */
header {
  padding: 60px 0 40px;
  position: relative;
}

header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, var(--blue), var(--purple), transparent);
}

.nav-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-display);
  font-size: 12px;
  color: var(--text-secondary);
  text-decoration: none;
  margin-bottom: 24px;
  transition: color 0.2s;
}

.nav-back:hover { color: var(--blue); }

.entity-type {
  display: inline-block;
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--blue);
  border: 1px solid var(--blue-dim);
  padding: 6px 16px;
  border-radius: 2px;
  background: var(--blue-dim);
  margin-bottom: 16px;
}

h1 {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 700;
  letter-spacing: -1px;
  color: var(--text-primary);
  margin-bottom: 12px;
}

.subtitle {
  font-size: 16px;
  color: var(--text-secondary);
}

/* ═══ STATS ═══ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 16px;
  margin: 32px 0;
}

.stat-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  text-align: center;
}

.stat-value {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  color: var(--blue);
  margin-bottom: 4px;
}

.stat-value.leave { color: var(--red); }
.stat-value.join { color: var(--green); }

.stat-label {
  font-family: var(--font-display);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

/* ═══ TIMELINE ═══ */
.timeline-section {
  padding: 20px 0 40px;
}

.timeline {
  position: relative;
  padding-left: 40px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 15px;
  top: 0;
  bottom: 0;
  width: 1px;
  background: linear-gradient(to bottom, var(--blue-dim), var(--border), transparent);
}

.event-card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 16px;
  transition: all 0.3s ease;
}

.event-card:hover {
  border-color: var(--blue-dim);
  background: var(--bg-card-hover);
  transform: translateX(4px);
}

.event-card.type-leave { border-left: 3px solid var(--red); }
.event-card.type-join { border-left: 3px solid var(--green); }

.event-card::before {
  content: '';
  position: absolute;
  left: -33px;
  top: 24px;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  border: 2px solid var(--bg-primary);
  z-index: 2;
}

.event-card.type-leave::before { background: var(--red); box-shadow: 0 0 8px var(--red-dim); }
.event-card.type-join::before { background: var(--green); box-shadow: 0 0 8px var(--green-dim); }

.event-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
  gap: 12px;
}

.event-title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
}

.event-badge {
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 2px;
  white-space: nowrap;
}

.badge-leave { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
.badge-join { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }

.event-role {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

.event-flow {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.company-tag {
  font-family: var(--font-display);
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 4px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-primary);
}

.flow-arrow {
  font-size: 16px;
  color: var(--amber);
}

.event-summary {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 12px;
}

.event-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--text-muted);
}

.event-date {
  font-family: var(--font-display);
}

.event-source a {
  color: var(--blue);
  text-decoration: none;
  font-family: var(--font-display);
  font-size: 11px;
  opacity: 0.7;
  transition: opacity 0.2s;
}

.event-source a:hover { opacity: 1; text-decoration: underline; }

/* ═══ RELATED ═══ */
.related-section {
  padding: 32px 0;
  border-top: 1px solid var(--border);
}

.section-title {
  font-family: var(--font-display);
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 20px;
}

.related-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.related-chip {
  font-family: var(--font-display);
  font-size: 12px;
  padding: 8px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-primary);
  text-decoration: none;
  transition: all 0.2s;
}

.related-chip:hover {
  border-color: var(--blue-dim);
  background: var(--bg-card-hover);
  color: var(--blue);
}

/* ═══ LOADING & EMPTY ═══ */
.loading, .empty {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-muted);
}

.loading-dots span {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--blue);
  margin: 0 4px;
  animation: loadBounce 1.4s ease infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes loadBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* ═══ FOOTER ═══ */
footer {
  text-align: center;
  padding: 40px 0;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 13px;
}

footer a {
  color: var(--blue);
  text-decoration: none;
}

footer a:hover { text-decoration: underline; }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 768px) {
  .container { padding: 0 16px; }
  header { padding: 40px 0 24px; }
  .timeline { padding-left: 28px; }
  .timeline::before { left: 8px; }
  .event-card::before { left: -26px; }
  .event-header { flex-direction: column; gap: 8px; }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<div class="container">
  <!-- HEADER -->
  <header>
    <a href="index.html" class="nav-back">← 返回追踪器</a>
    <div class="entity-type" id="entityType">加载中...</div>
    <h1 id="entityName">—</h1>
    <p class="subtitle" id="entitySubtitle">相关人事变动事件</p>

    <!-- STATS -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-item">
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">相关事件</div>
      </div>
      <div class="stat-item">
        <div class="stat-value leave" id="statLeave">—</div>
        <div class="stat-label">离职</div>
      </div>
      <div class="stat-item">
        <div class="stat-value join" id="statJoin">—</div>
        <div class="stat-label">入职</div>
      </div>
    </div>
  </header>

  <!-- TIMELINE -->
  <div class="timeline-section">
    <div id="loading" class="loading">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <p style="margin-top: 16px; font-family: var(--font-display); font-size: 12px;">加载数据中</p>
    </div>
    <div id="empty" class="empty" style="display: none;">
      <p>未找到相关事件</p>
    </div>
    <div class="timeline" id="timeline"></div>
  </div>

  <!-- RELATED -->
  <div class="related-section" id="relatedSection" style="display: none;">
    <h2 class="section-title">相关公司/人员</h2>
    <div class="related-grid" id="relatedGrid"></div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>数据通过自动化搜索每日更新</p>
    <p>由 <a href="https://github.com/mutjan/ai-talent-tracker" target="_blank">LobsterAI</a> 驱动</p>
  </footer>
</div>

<script>
let allEvents = [];

// Get URL parameters
function getUrlParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    type: params.get('type'), // 'person' or 'company'
    name: params.get('name')
  };
}

// Load data
async function loadData() {
  try {
    const res = await fetch('data/events.json');
    if (!res.ok) throw new Error('Failed to load data');
    allEvents = await res.json();

    const { type, name } = getUrlParams();

    if (!type || !name) {
      document.getElementById('loading').innerHTML = '<p>请从追踪器页面点击人名或公司名查看详情</p>';
      return;
    }

    renderPage(type, decodeURIComponent(name));
    document.getElementById('loading').style.display = 'none';

  } catch (err) {
    document.getElementById('loading').innerHTML = '<p>加载数据失败: ' + err.message + '</p>';
  }
}

function renderPage(type, name) {
  // Set header info
  document.getElementById('entityType').textContent = type === 'person' ? '◆ 人员详情' : '◆ 公司详情';
  document.getElementById('entityName').textContent = name;
  document.getElementById('entitySubtitle').textContent = type === 'person'
    ? `${name} 的人事变动记录`
    : `与 ${name} 相关的人事变动`;

  // Filter events
  const filtered = allEvents.filter(e => {
    if (type === 'person') {
      return e.person_name === name;
    } else {
      return e.from_company === name || e.to_company === name;
    }
  });

  // Sort by date (newest first)
  filtered.sort((a, b) => (b.date_event || '').localeCompare(a.date_event || ''));

  // Update stats
  const leaves = filtered.filter(e => e.event_type === 'leave').length;
  const joins = filtered.filter(e => e.event_type === 'join' || e.event_type === 'hire').length;
  document.getElementById('statTotal').textContent = filtered.length;
  document.getElementById('statLeave').textContent = leaves;
  document.getElementById('statJoin').textContent = joins;

  // Render timeline
  if (filtered.length === 0) {
    document.getElementById('empty').style.display = 'block';
    return;
  }

  const timeline = document.getElementById('timeline');
  timeline.innerHTML = filtered.map((e, i) => {
    const eventType = e.event_type === 'hire' ? 'join' : (e.event_type || 'leave');
    const badgeClass = eventType === 'join' ? 'badge-join' : 'badge-leave';
    const badgeText = eventType === 'join' ? '已入职' : '已离职';
    const from = e.from_company || '—';
    const to = e.to_company || '—';
    const date = e.date_event ? new Date(e.date_event).toLocaleDateString('zh-CN', { year: 'numeric', month: 'short', day: 'numeric' }) : '未知';

    // For person page, show company flow; for company page, show person name
    const title = type === 'person'
      ? (eventType === 'join' ? `加入 ${to}` : `离开 ${from}`)
      : e.person_name;

    return `
      <div class="event-card type-${eventType}" style="animation-delay: ${i * 0.05}s">
        <div class="event-header">
          <div class="event-title">${escapeHtml(title)}</div>
          <span class="event-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="event-role">${escapeHtml(e.role || '')}</div>
        <div class="event-flow">
          <span class="company-tag">${escapeHtml(from)}</span>
          <span class="flow-arrow">→</span>
          <span class="company-tag">${escapeHtml(to)}</span>
        </div>
        <div class="event-summary">${escapeHtml(e.summary || '')}</div>
        <div class="event-meta">
          <span class="event-date">${date}</span>
          ${e.source_url ? `<span class="event-source"><a href="${escapeHtml(e.source_url)}" target="_blank" rel="noopener">来源 ↗</a></span>` : ''}
        </div>
      </div>
    `;
  }).join('');

  // Render related entities
  renderRelated(type, name, filtered);
}

function renderRelated(type, name, events) {
  const related = new Set();

  events.forEach(e => {
    if (type === 'person') {
      // For person, show related companies
      if (e.from_company) related.add({ type: 'company', name: e.from_company });
      if (e.to_company) related.add({ type: 'company', name: e.to_company });
    } else {
      // For company, show related people
      if (e.person_name) related.add({ type: 'person', name: e.person_name });
    }
  });

  const relatedArray = [...related].filter(r => r.name !== name);

  if (relatedArray.length > 0) {
    document.getElementById('relatedSection').style.display = 'block';
    const grid = document.getElementById('relatedGrid');
    grid.innerHTML = relatedArray.map(r => `
      <a href="detail.html?type=${r.type}&name=${encodeURIComponent(r.name)}" class="related-chip">
        ${escapeHtml(r.name)}
      </a>
    `).join('');
  }
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Init
loadData();
</script>

</body>
</html>
